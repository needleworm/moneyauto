<!-- Ads Section -->
    <section id="team" class="bg-light-gray">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="section-heading">ads</h2>
                </div>
            </div>
            
            <div class="row">
                <div class="col-lg-8 col-lg-offset-2 text-center">
                    <h3>
                        <a href="https://www.paypal.com/paypalme/bhban">
                            <i class="fa fa-paypal"></i> PayPal 후원 (도네이션)
                        </a>
                    </h3>
                    <br/>
                    <h3>
                        <i class="fa fa-bitcoin"></i> 암호화폐 후원<br/>
                    </h3>
                    
                    BTC :  3JUoGmQLfhFBNfKBWNa92wGQ7w13CxjoBy<br/>
                    ETH : 0x20B65F0C4027345163f0A4Ee9f9d6Dd39ec957A6<br/><br/><br/><br/>
                </div>
            </div>
            <div class="row">
                <h3 class="col-lg-8 col-lg-offset-2 text-center">제 책을 소개합니다</h3>

                {% for book in site.books %}
                <div class="col-sm-4">
                    <div class="team-member">
                        <img src="img/books/{{ book.pic }}" class="img-responsive bookcover" alt="">
                        <h5>{{ book.title }}</h5 >
                        <p class="text-muted">{{ book.description }}</p>
                        <ul class="list-inline ">
                            {% for store in book.stores %}
                            <li>
                                <a href="{{ store.url }}">
                                    <img src="img/stores/{{store.shop}}.png" class="bookstore"/>
                                </a>
                            </li>
                            {% endfor %}

                        </ul>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>
